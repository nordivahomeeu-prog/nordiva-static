<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORDIVA HOME EUROPE - Premium Furniture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }
        header { background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #1e293b; text-decoration: none; }
        nav { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
        nav a { color: #64748b; text-decoration: none; font-size: 0.9rem; }
        nav a:hover { color: #1e293b; }
        .lang-selector select { padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; border-radius: 0.25rem; background: white; cursor: pointer; }
        .hero { background: #0f172a; color: white; padding: 5rem 2rem; }
        .hero-content { max-width: 1200px; margin: 0 auto; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; color: #94a3b8; margin-bottom: 2rem; }
        .btn { display: inline-block; background: white; color: #0f172a; padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600; }
        .products { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
        .products h2 { font-size: 2rem; margin-bottom: 2rem; color: #1e293b; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: white; border-radius: 0.75rem; overflow: hidden; border: 1px solid #e2e8f0; transition: box-shadow 0.2s; text-decoration: none; color: inherit; }
        .product-card:hover { box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .product-image { width: 100%; height: 250px; object-fit: cover; background: #f1f5f9; }
        .product-info { padding: 1.5rem; }
        .product-name { font-size: 1.1rem; font-weight: 600; color: #1e293b; margin-bottom: 0.5rem; }
        .product-category { color: #64748b; font-size: 0.85rem; text-transform: uppercase; }
        .product-price { color: #0f172a; font-weight: 600; margin-top: 0.5rem; }
        footer { background: #0f172a; color: white; padding: 2rem; text-align: center; margin-top: 4rem; }
        [dir="rtl"] { direction: rtl; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/" class="logo">NORDIVA</a>
            <nav>
                <a href="/" data-lang="home">Ana Sayfa</a>
                <a href="/products.html" data-lang="products">Ürünler</a>
                <a href="/about.html" data-lang="about">Hakkımızda</a>
                <a href="/contact.html" data-lang="contact">İletişim</a>
                <a href="/delivery.html" data-lang="delivery">Teslimat</a>
                <div class="lang-selector">
                    <select id="lang-select" onchange="changeLanguage(this.value)">
                        <option value="TR">🇹🇷 TR</option>
                        <option value="EN">🇬🇧 EN</option>
                        <option value="DE">🇩🇪 DE</option>
                        <option value="FR">🇫🇷 FR</option>
                        <option value="AR">🇸🇦 AR</option>
                    </select>
                </div>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1 data-lang="heroTitle">Premium Mobilya</h1>
            <p data-lang="heroText">Modern yaşam için tasarlanmış, el işçiliği mobilya koleksiyonumuzu keşfedin</p>
            <a href="/products.html" class="btn" data-lang="explore">Koleksiyonu Keşfet</a>
        </div>
    </section>

    <section class="products">
        <h2 data-lang="featured">Öne Çıkan Ürünler</h2>
        <div class="product-grid" id="featured-products"></div>
    </section>

    <footer>
        <p>&copy; 2024 NORDIVA HOME EUROPE. All rights reserved.</p>
    </footer>

    <script>
        const translations = {
            TR: { home: 'Ana Sayfa', products: 'Ürünler', about: 'Hakkımızda', contact: 'İletişim', delivery: 'Teslimat', heroTitle: 'Premium Mobilya', heroText: 'Modern yaşam için tasarlanmış, el işçiliği mobilya koleksiyonumuzu keşfedin', explore: 'Koleksiyonu Keşfet', featured: 'Öne Çıkan Ürünler', price: 'Fiyat İçin İletişime Geçin' },
            EN: { home: 'Home', products: 'Products', about: 'About', contact: 'Contact', delivery: 'Delivery', heroTitle: 'Premium Furniture', heroText: 'Discover our collection of handcrafted furniture designed for modern living', explore: 'Explore Collection', featured: 'Featured Products', price: 'Contact for Price' },
            DE: { home: 'Startseite', products: 'Produkte', about: 'Über uns', contact: 'Kontakt', delivery: 'Lieferung', heroTitle: 'Premium Möbel', heroText: 'Entdecken Sie unsere Kollektion handgefertigter Möbel für modernes Wohnen', explore: 'Kollektion entdecken', featured: 'Ausgewählte Produkte', price: 'Preis auf Anfrage' },
            FR: { home: 'Accueil', products: 'Produits', about: 'À propos', contact: 'Contact', delivery: 'Livraison', heroTitle: 'Meubles Premium', heroText: 'Découvrez notre collection de meubles artisanaux pour une vie moderne', explore: 'Découvrir', featured: 'Produits en Vedette', price: 'Prix sur demande' },
            AR: { home: 'الرئيسية', products: 'المنتجات', about: 'من نحن', contact: 'اتصل بنا', delivery: 'التوصيل', heroTitle: 'أثاث فاخر', heroText: 'اكتشف مجموعتنا من الأثاث اليدوي المصمم للحياة العصرية', explore: 'استكشاف', featured: 'منتجات مميزة', price: 'السعر عند الطلب' }
        };

        const featuredProducts = [
            {id: 50, name: 'Madrid Köşe Koltuk', category: 'Köşe Koltuk', image: 'https://cdn.shopify.com/s/files/1/0766/8246/1355/files/madridkosekoltuk_3.jpg?v=1776093146'},
            {id: 51, name: 'Marea Köşe Koltuk', category: 'Köşe Koltuk', image: 'https://cdn.shopify.com/s/files/1/0766/8246/1355/files/586669473_17851196070600970_2979464147891625364_n_1ff529ed-1eaa-434c-9f87-68402760634e.jpg?v=1776090485'},
            {id: 52, name: 'Assos Köşe Koltuk', category: 'Köşe Koltuk', image: 'https://cdn.shopify.com/s/files/1/0766/8246/1355/files/ASSOSkosekoltuktakimi_8_e9662c1a-b591-492a-9169-5b8c264e8970.jpg?v=1776093376'},
            {id: 36, name: 'Heritage Walnut', category: 'Yemek Masası', image: 'https://cdn.shopify.com/s/files/1/0766/8246/1355/files/heritage-walnut-ev-ortam-1.png?v=1777400902'},
            {id: 3, name: 'Moxie Chair', category: 'Sandalye', image: 'https://cdn.shopify.com/s/files/1/0766/8246/1355/files/image_5b7d7732-cbd7-49a1-a000-8a184ae8c9c0.png?v=1777581253'},
            {id: 1, name: 'Mono Triple Set', category: 'Sehpa', image: 'https://cdn.shopify.com/s/files/1/0766/8246/1355/files/image_ce5a3075-dcf2-454e-9591-e283e5a62e9a.png?v=1777581951'},
        ];

        function renderFeatured() {
            const grid = document.getElementById('featured-products');
            const lang = localStorage.getItem('language') || 'TR';
            const priceText = translations[lang].price;
            
            featuredProducts.forEach(p => {
                grid.innerHTML += `
                    <a href="products/product-${p.id}.html" class="product-card">
                        <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy">
                        <div class="product-info">
                            <div class="product-category">${p.category}</div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${priceText}</div>
                        </div>
                    </a>
                `;
            });
        }

        function changeLanguage(lang) {
            localStorage.setItem('language', lang);
            document.documentElement.dir = lang === 'AR' ? 'rtl' : 'ltr';
            
            const t = translations[lang];
            if (t) {
                document.querySelectorAll('[data-lang]').forEach(el => {
                    const key = el.getAttribute('data-lang');
                    if (t[key]) el.textContent = t[key];
                });
            }
            
            // Re-render featured products with new price text
            document.getElementById('featured-products').innerHTML = '';
            renderFeatured();
        }

        const savedLang = localStorage.getItem('language') || 'TR';
        document.getElementById('lang-select').value = savedLang;
        changeLanguage(savedLang);
        renderFeatured();
    </script>
</body>
</html>
