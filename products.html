/files/ASSOSkosekoltuktakimi_9_07a36c7f-b965-432c-b0f6-368be2ebe5d2.jpg?v=1776093376"]}];
        const translations = {"TR":{"title":"Ürünler - NORDIVA HOME EUROPE","home":"Ana Sayfa","products":"Ürünler","about":"Hakkımızda","contact":"İletişim","delivery":"Teslimat","all":"Tümü","coffee_table":"Sehpa","chair":"Sandalye","dining_table":"Yemek Masası","corner_sofa":"Köşe Koltuk","price":"Fiyat İçin İletişime Geçin","viewDetails":"Detayları Gör"},"EN":{"title":"Products - NORDIVA HOME EUROPE","home":"Home","products":"Products","about":"About","contact":"Contact","delivery":"Delivery","all":"All","coffee_table":"Coffee Table","chair":"Chair","dining_table":"Dining Table","corner_sofa":"Corner Sofa","price":"Contact for Price","viewDetails":"View Details"},"DE":{"title":"Produkte - NORDIVA HOME EUROPE","home":"Startseite","products":"Produkte","about":"Über uns","contact":"Kontakt","delivery":"Lieferung","all":"Alle","coffee_table":"Couchtisch","chair":"Stuhl","dining_table":"Esstisch","corner_sofa":"Ecksofa","price":"Preis auf Anfrage","viewDetails":"Details anzeigen"},"FR":{"title":"Produits - NORDIVA HOME EUROPE","home":"Accueil","products":"Produits","about":"À propos","contact":"Contact","delivery":"Livraison","all":"Tous","coffee_table":"Table Basse","chair":"Chaise","dining_table":"Table à Manger","corner_sofa":"Canapé d'angle","price":"Prix sur demande","viewDetails":"Voir détails"},"AR":{"title":"المنتجات - NORDIVA HOME EUROPE","home":"الرئيسية","products":"المنتجات","about":"من نحن","contact":"اتصل بنا","delivery":"التوصيل","all":"الكل","coffee_table":"طاولة قهوة","chair":"كرسي","dining_table":"طاولة طعام","corner_sofa":"كنبة زاوية","price":"السعر عند الطلب","viewDetails":"عرض التفاصيل"}};
        
        const categoryNames = {
            coffee_table: { TR: 'Sehpa', EN: 'Coffee Table', DE: 'Couchtisch', FR: 'Table Basse', AR: 'طاولة قهوة' },
            chair: { TR: 'Sandalye', EN: 'Chair', DE: 'Stuhl', FR: 'Chaise', AR: 'كرسي' },
            dining_table: { TR: 'Yemek Masası', EN: 'Dining Table', DE: 'Esstisch', FR: 'Table à Manger', AR: 'طاولة طعام' },
            corner_sofa: { TR: 'Köşe Koltuk', EN: 'Corner Sofa', DE: 'Ecksofa', FR: 'Canapé d\'angle', AR: 'كنبة زاوية' }
        };
        
        function renderProducts(filter = 'all') {
            const grid = document.getElementById('product-grid');
            const lang = localStorage.getItem('language') || 'TR';
            grid.innerHTML = '';
            
            products.forEach(p => {
                if (filter !== 'all' && p.category !== filter) return;
                
                const categoryName = categoryNames[p.category] ? categoryNames[p.category][lang] : p.category;
                const priceText = translations[lang] ? translations[lang].price : 'Fiyat İçin İletişime Geçin';
                const viewText = translations[lang] ? translations[lang].viewDetails : 'Detayları Gör';
                
                grid.innerHTML += `
                    <a href="products/product-${p.id}.html" class="product-card">
                        <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
                        <div class="product-info">
                            <div class="product-category">${categoryName}</div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${priceText}</div>
                            <div class="view-btn">${viewText}</div>
                        </div>
                    </a>
                `;
            });
        }
        
        function filterProducts(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(category);
        }
        
        function changeLanguage(lang) {
            localStorage.setItem('language', lang);
            document.documentElement.dir = lang === 'AR' ? 'rtl' : 'ltr';
            renderProducts('all');
            
            const t = translations[lang];
            if (t) {
                document.querySelectorAll('[data-lang]').forEach(el => {
                    const key = el.getAttribute('data-lang');
                    if (t[key]) el.textContent = t[key];
                });
            }
        }
        
        const savedLang = localStorage.getItem('language') || 'TR';
        document.getElementById('lang-select').value = savedLang;
        changeLanguage(savedLang);
        renderProducts();
    </script>
